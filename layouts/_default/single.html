{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <div class="meta">
    <time datetime="{{ .Date }}">{{ .Date.Format "Jan 2, 2006" }}</time>
    {{ if .Params.tags }}
    <span class="tags">
      {{ range .Params.tags }}
      <a href="/tags/{{ . | urlize }}">{{ . }}</a>
      {{ end }}
    </span>
    {{ end }}
  </div>
  <div class="content">
    {{ .Content }}
  </div>
{{ end }}
