{{ if or (.Paginator.HasPrev) (.Paginator.HasNext) }}
  <ul class="post-pager">
    {{ if .Paginator.HasPrev }}
      <li class="pager-prev">
        <a href="{{ .Paginator.Prev.URL }}">&larr; {{ i18n "newerPosts" }}</a>
      </li>
    {{ end }}
    {{ if .Paginator.HasNext }}
      <li class="pager-next">
        <a href="{{ .Paginator.Next.URL }}">{{ i18n "olderPosts" }} &rarr;</a>
      </li>
    {{ end }}
  </ul>
{{ end }}
